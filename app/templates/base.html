<!-- 基础模板，所有页面继承该模板，实现代码复用 -->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}FastAPI学习项目{% endblock %}</title>
    <!-- 引入静态CSS文件 -->
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <!-- 顶部导航栏 -->
    <header class="header">
        <div class="container">
            <h1>PDF 图书管理系统</h1>
            <nav class="nav">
                <a href="/">首页</a>
                <a href="/book-list">图书列表</a>
                <a href="/docs">接口文档</a>
                <a href="/redoc">Redoc文档</a>
            </nav>
        </div>
    </header>

    <!-- 主内容区：子页面通过block填充 -->
    <main class="main">
        <div class="container">
            {% block content %}{% endblock %}
        </div>
    </main>

    <!-- 页脚 -->
    <footer class="footer">
        <div class="container">
            <p>© PDF 图书管理系统 - 专为入门打造</p>
        </div>
    </footer>
</body>
</html>
